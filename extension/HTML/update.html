<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="light dark">
  <title>SOOP - 애드블록 업데이트 공지</title>
  <style>
    :root {
      --bg: #f6f8fa;
      --text: #222;
      --card-bg: #ffffff;
      --accent: #0078d4;
      --border: #d0d7de;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d1117;
        --text: #e6edf3;
        --card-bg: #161b22;
        --accent: #58a6ff;
        --border: #30363d;
      }
    }

    body {
      font-family: "Pretendard", "Noto Sans KR", "Segoe UI", "Apple SD Gothic Neo", sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 80px 20px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      font-size: 18px;
      line-height: 1.7;
    }

    main {
      background-color: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.12);
      max-width: 780px;
      width: 100%;
      padding: 60px 50px;
      box-sizing: border-box;
      transition: background 0.3s ease, color 0.3s ease;
    }

    h1 {
      color: var(--accent);
      font-size: 2.2em;
      font-weight: 700;
      margin-bottom: 0.8em;
      text-align: center;
    }

    p {
      margin: 1em 0;
      text-align: justify;
    }

    strong {
      color: var(--accent);
    }

    footer {
      margin-top: 60px;
      font-size: 1em;
      color: var(--text);
      opacity: 0.7;
      text-align: center;
    }

    a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main>
    <h1>SOOP - 애드블록 확장 프로그램 공지</h1>
    <p><strong>2.5 버전</strong>으로 업데이트되었습니다.</p>
    <p>숲 업데이트에 대한 대응 업데이트를 진행했습니다. </p>

    <p></strong></p>
    <p></p>
    <img src="2.png" alt="업데이트 이미지" style="
  width:100%;
  max-width:600px;
  display:block;
  margin:30px auto;
  border-radius:12px;
">주석 내용 -->
    <footer>SOOP - 애드블록 확장프로그램</footer>
  </main>
</body>
</html>
